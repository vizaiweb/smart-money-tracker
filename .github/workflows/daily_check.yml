name: 亞微秒高頻交易戰報系統

on:
  schedule:
    # 執行時間 (UTC)，轉換為澳門時間 (+8 小時)
    - cron: '0 1 * * 1-5'    # 09:00 早報
    - cron: '0 6 * * 1-5'    # 14:00 午報
    - cron: '0 12 * * 1-5'   # 20:00 盤前預警
    # --- 衝刺時段 ---
    - cron: '00 13 * * 1-5'  # 21:00 (T-30)
    - cron: '25 13 * * 1-5'  # 21:25 (T-5)
    - cron: '30 13 * * 1-5'  # 21:30 (T+0 開盤)
    - cron: '33 13 * * 1-5'  # 21:33 (T+3 驗證)
    # ----------------
    - cron: '0 22 * * 1-5'   # 06:00 收盤
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出 dev 代碼
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝依賴
        run: |
          pip install yfinance google-genai

      - name: 執行分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: 部署數據至 gh-pages-dev
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages-dev
          folder: build
          clean: false
          single-commit: true
