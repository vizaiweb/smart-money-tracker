name: 亞微秒高頻交易戰報系統

on:
  schedule:
    - cron: '0 1 * * 1-5'    # 09:00
    - cron: '0 6 * * 1-5'    # 14:00
    - cron: '0 12 * * 1-5'   # 20:00
    - cron: '00 13 * * 1-5'  # 21:00 (T-30)
    - cron: '25 13 * * 1-5'  # 21:25 (T-5)
    - cron: '30 13 * * 1-5'  # 21:30 (T+0)
    - cron: '33 13 * * 1-5'  # 21:33 (T+3)
    - cron: '0 22 * * 1-5'   # 06:00
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # 【修正 1】明確賦予寫入權限
    permissions:
      contents: write
      
    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝依賴
        run: pip install -r requirements.txt

      - name: 執行亞微秒分析引擎 (賺錢模式)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 【修正 2】傳遞事件名稱，讓 Python 知道這是手動觸發
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python main.py

      - name: 部署戰報至 gh-pages-dev 分支
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages-dev
          folder: build
          # 【修正 3】建議設為 true，清理臨時衝突檔案
          clean: true 
          single-commit: true
