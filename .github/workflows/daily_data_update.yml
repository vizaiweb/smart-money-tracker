name: Daily Data Update (收盘后)

on:
  schedule:
    - cron: '30 21 * * 1-5'   # 澳门时间 05:30 (美股收盘后约半小时)
  workflow_dispatch:          # 保留手动触发

jobs:
  update-data:
    timeout-minutes: 15       # 数据下载可能较慢，放宽到15分钟
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install yfinance google-genai pandas

      - name: Run Data Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_technical_data.py   # 新脚本，只下载和存储技术指标
      
      - name: Upload technical data
        uses: actions/upload-artifact@v4
        with:
          name: technical-data
          path: technical_data.json          # 存储技术指标供其他工作流使用
          retention-days: 1
